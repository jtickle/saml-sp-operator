# nginx as a pure FastCGI -> HTTP adapter. It does NOT enforce anything itself
# (no auth_request / shib_request). Traefik's ForwardAuth provides the FastCGI
# Authorizer semantics -- on 2xx it copies authResponseHeaders upstream, on
# non-2xx (e.g. the 302 to the IdP) it returns the response to the browser.
# So nginx only has to surface the authorizer's raw response over HTTP.
#
# >>> SPIKE HYPOTHESIS #1 <<<  that a plain fastcgi_pass to the authorizer
# socket surfaces its verdict (200 + Variable-* headers, or 302 + Location)
# as an ordinary HTTP response. If Variable-* headers or the redirect don't
# come through, the fallback is the ngx_http_shibboleth module + shib_request.

# nginx is launched as root (by supervisord) so it can bind/chown; workers must
# drop to www-data, which is in the _shibd group (see Dockerfile) so they can
# reach the 0660 _shibd:_shibd FastCGI sockets. Without this, workers run as the
# compiled-in default 'nobody' and get EACCES on the sockets.
user www-data;
worker_processes auto;
error_log /dev/stderr info;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    default_type application/octet-stream;

    server {
        listen 8080;
        server_name _;

        # ---- readiness/liveness ----------------------------------------------
        # A dumb 200 from nginx itself, deliberately NOT a SP handler. The SP's
        # handlers require the request host+port to match the fully-qualified
        # handlerURL (the external host:30443), which a kube-probe hitting the
        # pod IP on :8080 cannot satisfy -- probing a SP handler would 500
        # forever. nginx being up is a sufficient readiness signal here; the
        # real SP round-trip is validated by the browser flow.
        location = /healthz { access_log off; return 200 "ok\n"; }

        # ---- SP handler endpoints (ACS, Login, Logout, Metadata) -------------
        # Reached via the UNPROTECTED HTTPRoute for /Shibboleth.sso.
        # The browser talks to these directly; no forward-auth in front.
        location /Shibboleth.sso {
            # Overrides MUST precede `include fastcgi_params`: nginx emits every
            # fastcgi_param it's given and the SP's FastCGI app honors the FIRST
            # occurrence of each name. If the include runs first, its stock
            # $server_name (_) / $server_port (8080) / no-HTTPS win, and the SP
            # rebuilds a bogus http://_:8080 self-URL -> "should only be used for
            # Shibboleth protocol requests" 500s. Behind a TLS-terminating
            # gateway we must assert the real host + https so the ACS/handler
            # URLs the SP builds match its metadata.
            fastcgi_param HTTPS       on;
            # NodePort: the browser's public authority is host:30443, so the SP
            # must build ACS/handler URLs on :30443 (handler Locations are
            # relative -> the port comes from here). 443 here would advertise an
            # ACS the IdP posts to on :443, which never reaches the :30443 svc.
            # For the operator this external port is a real config input.
            fastcgi_param SERVER_PORT 30443;
            fastcgi_param SERVER_NAME $host;
            # HTTP_HOST MUST carry the non-standard port. The SP reconstructs its
            # self-URL authority from HTTP_HOST and, when HTTP_HOST has no port,
            # defaults to the scheme port (443) -- NOT SERVER_PORT. That yields
            # https://host/Shibboleth.sso, which doesn't contain the :30443
            # handler base pinned in handlerURL, so shibresponder rejects every
            # request ("should only be used for Shibboleth protocol requests").
            # nginx does not forward the client Host header to FastCGI, and $host
            # strips the port, so we append it explicitly. (Browser sends
            # Host: host:30443; $host is still just the host, hence $host:30443.)
            fastcgi_param HTTP_HOST   $host:30443;
            include fastcgi_params;
            fastcgi_pass unix:/run/shibboleth/shibresponder.sock;
        }

        # SP static error/style assets referenced by <Errors>.
        location /shibboleth-sp {
            alias /usr/share/shibboleth/;
        }

        # ---- the forward-auth check ------------------------------------------
        # Traefik calls GET /authcheck and passes the ORIGINAL request in
        # X-Forwarded-* headers. We rewrite the FastCGI params so the SP's
        # RequestMapper keys on the real host+path (for applicationId + the
        # requireSession decision), not on "/authcheck".
        #
        # >>> SPIKE HYPOTHESIS #2 <<<  these are the param names the SP
        # reconstructs the request URL from. Verify in shibd logs that it sees
        # the real host/URI; adjust names if not.
        location = /authcheck {
            # Same first-wins rule as the responder block above: these overrides
            # MUST precede `include fastcgi_params`, or the authorizer keys the
            # RequestMapper on /authcheck instead of the real forwarded URL and
            # hypothesis #2 fails. We rewrite the params so the SP reconstructs
            # the ORIGINAL request (carried in X-Forwarded-*), not /authcheck.
            fastcgi_param SERVER_NAME    $http_x_forwarded_host;
            fastcgi_param HTTP_HOST      $http_x_forwarded_host;
            fastcgi_param SERVER_PORT    30443;
            fastcgi_param REQUEST_URI    $http_x_forwarded_uri;
            fastcgi_param DOCUMENT_URI   $http_x_forwarded_uri;
            fastcgi_param REQUEST_METHOD $http_x_forwarded_method;
            fastcgi_param HTTPS          on;
            # fastcgi_params does NOT pass the cookie by default; the SP needs it
            # to find the session. Traefik forwards the browser's Cookie header
            # to this subrequest.
            fastcgi_param HTTP_COOKIE    $http_cookie;

            include fastcgi_params;
            fastcgi_pass unix:/run/shibboleth/shibauthorizer.sock;
        }
    }
}
