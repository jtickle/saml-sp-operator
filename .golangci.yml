version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - modernize
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - logcheck
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    goconst:
      # Don't flag encoding/xml attribute string values (Type="XML",
      # Validate="true", ReloadChanges="false") in the renderers — naming
      # these constants reads worse than the literal. goconst still catches
      # genuine magic strings elsewhere in production code.
      ignore-string-values:
        - '^(true|false|XML)$'
    depguard:
      rules:
        forbid-sort-pkg:
          deny:
            - pkg: sort
              desc: Should be replaced with slices package
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    modernize:
      disable:
        - omitzero
        - newexpr
  exclusions:
    generated: lax
    rules:
      # Test fixtures repeat literals by design — table-driven cases read
      # better with expected values inline than hidden behind constants — so
      # goconst is noise on test files. gocyclo likewise: multi-scenario
      # property/table tests are naturally branchy without being hard to read.
      # Production code stays covered by both.
      - linters:
          - goconst
          - gocyclo
        path: _test\.go
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
