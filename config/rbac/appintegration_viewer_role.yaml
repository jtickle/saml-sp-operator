# This rule is not used by the project saml-sp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to saml.tickletechnologies.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: saml-sp-operator
    app.kubernetes.io/managed-by: kustomize
  name: appintegration-viewer-role
rules:
- apiGroups:
  - saml.tickletechnologies.com
  resources:
  - appintegrations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - saml.tickletechnologies.com
  resources:
  - appintegrations/status
  verbs:
  - get
