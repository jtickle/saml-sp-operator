# This rule is not used by the project saml-sp-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the saml.tickletechnologies.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: saml-sp-operator
    app.kubernetes.io/managed-by: kustomize
  name: appintegration-editor-role
rules:
- apiGroups:
  - saml.tickletechnologies.com
  resources:
  - appintegrations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - saml.tickletechnologies.com
  resources:
  - appintegrations/status
  verbs:
  - get
