---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: spinstances.saml.tickletechnologies.com
spec:
  group: saml.tickletechnologies.com
  names:
    kind: SPInstance
    listKind: SPInstanceList
    plural: spinstances
    shortNames:
    - spi
    singular: spinstance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.entityID
      name: EntityID
      type: string
    - jsonPath: .status.boundCount
      name: Bound
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SPInstance is the Schema for the spinstances API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of SPInstance
            properties:
              allowedNamespaces:
                description: |-
                  allowedNamespaces is the consent selector deciding which app namespaces may
                  bind an AppIntegration to this SPInstance. A nil selector denies all
                  cross-namespace binds; an empty selector ({}) allows all. This prevents an
                  app team from binding another tenant's federation trust by name (DESIGN §5).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              credentials:
                description: |-
                  credentials references the Secret in this namespace holding the SP signing/
                  encryption keypair. Conventional keys: tls.crt and tls.key.
                properties:
                  name:
                    description: name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              entityID:
                description: |-
                  entityID is the SAML entityID advertised by the whole SP deployment.
                  One entityID per deployment — do NOT mint one per app (federation
                  anti-pattern, DESIGN §5).
                minLength: 1
                type: string
              idp:
                description: |-
                  idp configures the trusted identity provider(s): a single IdP by metadata,
                  or a signed federation metadata feed with a verification certificate.
                properties:
                  entityID:
                    description: |-
                      entityID pins a single IdP entityID to trust within a multi-entity
                      federation feed. Omit to trust the whole feed.
                    type: string
                  metadataURL:
                    description: |-
                      metadataURL is the URL of the IdP metadata or the federation metadata feed.
                      Egress-restricted clusters need an egress allowance or an in-cluster mirror
                      to reach this (DESIGN §11).
                    minLength: 1
                    type: string
                  signingCert:
                    description: |-
                      signingCert references a Secret holding the certificate used to verify a
                      signed federation metadata feed. Required for federation feeds; omit for a
                      single unsigned IdP metadata document.
                    properties:
                      name:
                        description: name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - metadataURL
                type: object
              sessionStore:
                description: |-
                  sessionStore references the shared session store (memcached) that lets
                  sessions and Single Logout work across SP replicas. Omit for a single-
                  replica in-memory store (no HA, no cross-replica SLO).
                properties:
                  memcachedServers:
                    description: memcachedServers is the list of host:port memcached
                      endpoints.
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - memcachedServers
                type: object
            required:
            - credentials
            - entityID
            - idp
            type: object
          status:
            description: status defines the observed state of SPInstance
            properties:
              boundCount:
                description: |-
                  boundCount is the number of AppIntegrations currently aggregated into this
                  SP's rendered config.
                format: int32
                type: integer
              conditions:
                description: |-
                  conditions represent the current state of the SPInstance resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                  Condition types: ConfigRendered, RolloutReady, Ready, Degraded (DESIGN §7).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              configHash:
                description: |-
                  configHash is the hash of the rendered shibboleth2.xml + nginx.conf. The
                  Deployment rolls only when this changes, so unrelated AppIntegration
                  reconciles don't churn the fleet (DESIGN §7).
                type: string
              metadataURL:
                description: |-
                  metadataURL is the SP metadata URL to hand to IdP/federation admins for
                  registration — surfaced in status so it can be read straight from the
                  object (DESIGN §7).
                type: string
              observedGeneration:
                description: observedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
