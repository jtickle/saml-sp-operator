name: build-authenticator

# Builds the encapsulated Shibboleth SP "authenticator" image and pushes it to
# GHCR. Runs off main when the image inputs change (plus on-demand via
# workflow_dispatch). The built-in GITHUB_TOKEN has packages:write to this
# repo's GHCR namespace, so no extra secret is needed. Build context is
# build/authenticator (Dockerfile + supervisord.conf); the rendered
# shibboleth2.xml/nginx.conf come from a ConfigMap at runtime, not baked in.
on:
  push:
    branches: [main]
    paths:
      - build/authenticator/Dockerfile
      - build/authenticator/supervisord.conf
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # -> ghcr.io/jtickle/saml-sp-operator/shib-authenticator
          images: ghcr.io/${{ github.repository }}/shib-authenticator
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: build/authenticator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
